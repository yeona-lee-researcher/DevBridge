spring.application.name=devbridge

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/devbridge_db?serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Gemini API (환경변수 GEMINI_API_KEY 설정 필수)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=gemini-2.5-flash
gemini.api.fallback-model=gemini-2.0-flash
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models

#Chat Stream API (환경변수 STREAM_CHAT_API_KEY, STREAM_CHAT_API_SECRET 설정 필수)
stream.chat.api-key=${STREAM_CHAT_API_KEY}
stream.chat.api-secret=${STREAM_CHAT_API_SECRET}

# JWT
app.jwt.secret=${JWT_SECRET:dev-bridge-default-secret-key-change-in-production-please-32bytes}
app.jwt.ttl-hours=24

# Mail (Gmail SMTP) - 환경변수 MAIL_USERNAME, MAIL_PASSWORD 필요
# MAIL_PASSWORD는 Gmail 일반 비번이 아니라 "앱 비밀번호"여야 함 (https://myaccount.google.com/apppasswords)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# 인증 코드 만료 (분)
app.verify.code-ttl-minutes=5

# Stream Chat
stream.chat.api-key=${STREAM_CHAT_API_KEY}
stream.chat.api-secret=${STREAM_CHAT_API_SECRET}
