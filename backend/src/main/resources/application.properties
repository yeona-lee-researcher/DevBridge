spring.application.name=devbridge

# 기본 프로파일을 local 로 (CLI 인자/환경변수로 명시되지 않은 경우).
# - 운영: --spring.profiles.active=prod 또는 SPRING_PROFILES_ACTIVE=prod 로 덮어쓰기
# - 로컬 개발: application-local.properties 의 키들이 자동 적용됨
spring.profiles.default=local

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:devbridge_db}?serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Gemini API (환경변수 GEMINI_API_KEY 설정 필수)
gemini.api.key=${GEMINI_API_KEY:}
# 메인: 가장 똑똑한 2.5-pro (긴 CV/복잡한 추론에 강함, 출력 한도도 큼)
# 폴백: 429/403 시 자동 전환되는 더 가벼운 flash 계열
gemini.api.model=gemini-2.5-pro
gemini.api.fallback-model=gemini-2.5-flash
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models

#Chat Stream API (환경변수 STREAM_CHAT_API_KEY, STREAM_CHAT_API_SECRET 설정 필수)
stream.chat.api-key=${STREAM_CHAT_API_KEY:}
stream.chat.api-secret=${STREAM_CHAT_API_SECRET:}

# JWT
app.jwt.secret=${JWT_SECRET:dev-bridge-default-secret-key-change-in-production-please-32bytes}
app.jwt.ttl-hours=24

# Auth cookie (HttpOnly JWT). 운영(HTTPS)에선 prod 프로파일에서 secure=true로 오버라이드.
app.cookie.secure=false
app.cookie.same-site=Lax

# Mail (Gmail SMTP) - 환경변수 MAIL_USERNAME, MAIL_PASSWORD 필요
# MAIL_PASSWORD는 Gmail 일반 비번이 아니라 "앱 비밀번호"여야 함 (https://myaccount.google.com/apppasswords)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# 인증 코드 만료 (분)
app.verify.code-ttl-minutes=5

# File upload (Multipart)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# 업로드 파일 저장 경로 (절대경로 또는 상대경로). 기본: backend/uploads/
app.upload.dir=${UPLOAD_DIR:uploads}
# 정적 서빙 URL 프리픽스 (이 prefix 뒤로 파일이 노출됨)
app.upload.public-base=/files
